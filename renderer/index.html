<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Naheed AI Assistant</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════ TITLE BAR -->
  <div id="titlebar">
    <div id="titlebar-drag">
      <img src="../assets/logo.svg" id="titlebar-logo" alt="" />
      <span id="titlebar-title">Naheed AI Assistant</span>
    </div>
    <div id="titlebar-controls">
      <button id="btn-pin"     title="Toggle always-on-top">📌</button>
      <button id="btn-minimize"title="Minimize">─</button>
      <button id="btn-close"   title="Close">✕</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════ LAYOUT -->
  <div id="layout">

    <!-- ─── SIDEBAR ─── -->
    <nav id="sidebar">
      <ul id="nav-list">
        <li class="nav-item active" data-view="dashboard">
          <span class="nav-icon">⊞</span>
          <span class="nav-label">Dashboard</span>
        </li>
        <li class="nav-item" data-view="printer">
          <span class="nav-icon">🖨</span>
          <span class="nav-label">Printers</span>
          <span class="nav-badge" id="badge-printer"></span>
        </li>
        <li class="nav-item" data-view="scanner">
          <span class="nav-icon">⬛</span>
          <span class="nav-label">Scanners</span>
          <span class="nav-badge" id="badge-scanner"></span>
        </li>
        <li class="nav-item" data-view="network">
          <span class="nav-icon">🌐</span>
          <span class="nav-label">Network</span>
          <span class="nav-badge" id="badge-network"></span>
        </li>
        <li class="nav-item" data-view="ecr">
          <span class="nav-icon">💳</span>
          <span class="nav-label">ECR / Bank</span>
          <span class="nav-badge" id="badge-ecr"></span>
        </li>
        <li class="nav-item" data-view="services">
          <span class="nav-icon">⚙</span>
          <span class="nav-label">Services</span>
          <span class="nav-badge" id="badge-services"></span>
        </li>
        <li class="nav-divider"></li>
        <li class="nav-item" data-view="chat">
          <span class="nav-icon">🤖</span>
          <span class="nav-label">AI Assistant</span>
        </li>
        <li class="nav-item" data-view="settings">
          <span class="nav-icon">⚙</span>
          <span class="nav-label">Settings</span>
        </li>
      </ul>

      <div id="sidebar-footer">
        <div id="overall-status">
          <span id="status-dot" class="dot dot-gray"></span>
          <span id="status-text">Not scanned</span>
        </div>
      </div>
    </nav>

    <!-- ─── MAIN CONTENT ─── -->
    <main id="content">
      <!-- Views injected by app.js -->
    </main>

  </div><!-- /#layout -->

  <script src="app.js"></script>
</body>
</html>
